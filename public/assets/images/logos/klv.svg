<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="100%" height="100%">
  <defs>
    <!-- Copper/Bronze Line Gradient -->
    <linearGradient id="bronze-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C583E" />
      <stop offset="50%" stop-color="#C5947C" />
      <stop offset="100%" stop-color="#603722" />
    </linearGradient>
  </defs>

  <!-- Left Icon: Copper Square with Diagonal Slots/Lines -->
  <g transform="translate(20, 20)">
    <!-- Outer Square Boundary (Invisible clip / container) -->
    <!-- Diagonal Parallel Lines filling a square -->
    <path d="M0,0 L120,0 L120,120 L0,120 Z" fill="none" />
    
    <!-- Drawing 12 clean diagonal lines -->
    <line x1="-10" y1="20" x2="20" y2="-10" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="-10" y1="45" x2="45" y2="-10" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="-10" y1="70" x2="70" y2="-10" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="-10" y1="95" x2="95" y2="-10" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="-10" y1="120" x2="120" y2="-10" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="15" y1="130" x2="130" y2="15" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="40" y1="130" x2="130" y2="40" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="65" y1="130" x2="130" y2="65" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
    <line x1="90" y1="130" x2="130" y2="90" stroke="url(#bronze-grad)" stroke-width="6.5" stroke-linecap="round" />
  </g>

  <!-- Right Typography Section -->
  <!-- "KLV" -->
  <text x="175" y="78" font-family="'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-size="64" font-weight="900" fill="#1E293B" letter-spacing="1">KLV</text>
  
  <!-- "GROUP" -->
  <text x="175" y="120" font-family="'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#1E293B" letter-spacing="4">GROUP</text>

  <!-- Tagline: "LIVE BETTER" -->
  <text x="175" y="152" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#64748B" letter-spacing="14">LIVE BETTER</text>
</svg>
