<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C59B27" />
      <stop offset="50%" stop-color="#E5C158" />
      <stop offset="100%" stop-color="#A67C1E" />
    </linearGradient>
  </defs>

  <!-- Background for contrast (optional, transparent in practice but good for display) -->
  <rect width="100%" height="100%" fill="none" />

  <!-- Logo Mark (Affinity Stylized Gate) -->
  <g transform="translate(140, 20)">
    <!-- Arch / Pillars -->
    <path d="M20,60 L20,10 A10,10 0 0,1 30,0 L90,0 A10,10 0 0,1 100,10 L100,60" fill="none" stroke="url(#gold-grad)" stroke-width="4.5" />
    <path d="M30,60 L30,15 A5,5 0 0,1 35,10 L85,10 A5,5 0 0,1 90,15 L90,60" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" />

    <!-- Left Horizontal Brackets -->
    <line x1="0" y1="20" x2="30" y2="20" stroke="url(#gold-grad)" stroke-width="4" />
    <line x1="0" y1="35" x2="30" y2="35" stroke="url(#gold-grad)" stroke-width="4" />
    <line x1="0" y1="50" x2="30" y2="50" stroke="url(#gold-grad)" stroke-width="4" />

    <!-- Right Horizontal Brackets -->
    <line x1="90" y1="20" x2="120" y2="20" stroke="url(#gold-grad)" stroke-width="4" />
    <line x1="90" y1="35" x2="120" y2="35" stroke="url(#gold-grad)" stroke-width="4" />
    <line x1="90" y1="50" x2="120" y2="50" stroke="url(#gold-grad)" stroke-width="4" />

    <!-- Center Cross bar / Details -->
    <line x1="30" y1="35" x2="90" y2="35" stroke="url(#gold-grad)" stroke-width="3" />
    <line x1="30" y1="50" x2="90" y2="50" stroke="url(#gold-grad)" stroke-width="3" />
  </g>

  <!-- Typography -->
  <text x="200" y="145" font-family="'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#132D23" letter-spacing="4" text-anchor="middle">AFFINITY</text>
  <text x="200" y="195" font-family="'Inter', 'Montserrat', 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#132D23" letter-spacing="5" text-anchor="middle">BUILDTECH</text>
</svg>
